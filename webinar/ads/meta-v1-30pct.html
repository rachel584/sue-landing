<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Meta V1 - 30% Stat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #FFFFFF;
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    position: relative;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 80px 40px 80px;
    text-align: center;
    margin-top: -40px;
  }

  .stat {
    font-family: Georgia, serif;
    font-weight: bold;
    font-size: 340px;
    color: #FF5A5F;
    line-height: 0.9;
    letter-spacing: -10px;
    margin-bottom: 32px;
  }

  .subline {
    font-family: Georgia, serif;
    font-weight: normal;
    font-size: 56px;
    color: #333333;
    line-height: 1.3;
    margin-bottom: 16px;
  }

  .subline-small {
    font-family: Georgia, serif;
    font-weight: normal;
    font-style: italic;
    font-size: 42px;
    color: #333333;
    line-height: 1.3;
  }

  .bottom {
    padding: 0 80px 60px 80px;
  }

  .divider {
    width: 100%;
    height: 2px;
    background: #FF5A5F;
    margin-bottom: 28px;
  }

  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .event-details {
    font-family: 'Open Sans', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #797979;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .logo-container img {
    height: 40px;
    width: auto;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="stat">30%</div>
    <div class="subline">stall after the pilot.</div>
    <div class="subline-small">Not because of technology.</div>
  </div>
  <div class="bottom">
    <div class="divider"></div>
    <div class="bottom-row">
      <div class="event-details">Free Masterclass&nbsp;&nbsp;|&nbsp;&nbsp;4 March</div>
      <div class="logo-container">
        <img src="../SUE-Logo-bol-Behavioural-Design-Academy.png" alt="SUE">
      </div>
    </div>
  </div>
</body>
</html>
